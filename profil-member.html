<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <style>
        /* === TEMA DIPERTAHANKAN PERSIS === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }

        .wadah-profil {
            max-width: 600px;
            margin: 32px auto;
            padding: 0 16px;
        }
        .kartu-profil {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .judul-profil {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F1F5F9;
        }
        .baris-data {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #F8FAFC;
            font-size: 15px;
        }
        .baris-data:last-child { border: none; }
        .label { font-weight: 500; color: #64748B; }
        .nilai { font-weight: 600; color: #1E293B; text-align: right; }
        .lencana-paket {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }
        .paket-gratis { background: #94A3B8; }
        .paket-kaveling { background: #10B981; }
        .paket-cluster { background: #3B82F6; }
        .paket-residence { background: #F59E0B; }
        .paket-estate { background: #8B5CF6; }

        .tombol-keluar {
            width: 100%;
            padding: 12px;
            margin-top: 24px;
            background: #EF4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px; font-weight: 600;
            cursor: pointer;
        }
        .tombol-keluar:hover { background: #DC2626; }
    </style>
</head>
<body>

<main>
    <div class="wadah-profil">
        <div class="kartu-profil">
            <h1 class="judul-profil">👤 Profil Anggota Teravia</h1>

            <div id="isiProfil">
                <!-- Data dimuat otomatis -->
            </div>

            <button id="tombolKeluar" class="tombol-keluar">Keluar dari Akun</button>
        </div>
    </div>
</main>

<script>
// Cek status login
const dataAkun = JSON.parse(localStorage.getItem('sesiTeravia') || 'null');

if (!dataAkun) {
    alert('⚠️ Silakan masuk terlebih dahulu!');
    window.location.href = 'login.html';
} else {
    tampilkanProfil();
}

function tampilkanProfil() {
    const wadah = document.getElementById('isiProfil');
    
    // Warna lencana paket sesuai jenis
    let kelasLencana = 'paket-gratis';
    if (dataAkun.jenisKeanggotaan === 'Kaveling') kelasLencana = 'paket-kaveling';
    if (dataAkun.jenisKeanggotaan === 'Cluster') kelasLencana = 'paket-cluster';
    if (dataAkun.jenisKeanggotaan === 'Residence') kelasLencana = 'paket-residence';
    if (dataAkun.jenisKeanggotaan === 'Estate') kelasLencana = 'paket-estate';

    wadah.innerHTML = `
        <div class="baris-data">
            <span class="label">Nama Lengkap</span>
            <span class="nilai">${dataAkun.namaLengkap}</span>
        </div>
        <div class="baris-data">
            <span class="label">Nomor HP</span>
            <span class="nilai">${dataAkun.nomorHp}</span>
        </div>
        <div class="baris-data">
            <span class="label">Email</span>
            <span class="nilai">${dataAkun.email}</span>
        </div>
        <div class="baris-data">
            <span class="label">Tanggal Daftar</span>
            <span class="nilai">${dataAkun.tanggalDaftar}</span>
        </div>
        <div class="baris-data">
            <span class="label">Jenis Keanggotaan</span>
            <span class="nilai"><span class="lencana-paket ${kelasLencana}">${dataAkun.jenisKeanggotaan}</span></span>
        </div>
    `;
}

// Logika keluar akun
document.getElementById('tombolKeluar').addEventListener('click', () => {
    if (confirm('Yakin ingin keluar?')) {
        localStorage.removeItem('sesiTeravia');
        window.location.href = 'index.html';
    }
});
</script>

</body>
</html>
