<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Teravia</title>
    <link rel="icon" href="/assets/img/logo.png">
    <link rel="stylesheet" href="/assets/css/general.css">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; font-family: system-ui, sans-serif; }
        body { background: #f8fafc; padding: 20px 0; min-height: 100vh; }
        .wadah { max-width: 1000px; margin: 0 auto; padding: 0 16px; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap:12px; }
        .header-admin h1 { font-size: 22px; color: #165DFF; }
        .info-login { font-size: 13px; color: #64748b; margin-top: 4px; }
        .btn-keluar { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight:600; }
        
        .ringkasan { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
        .kartu-ringkasan { background: white; padding: 16px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .angka { font-size: 26px; font-weight: 700; color: #165DFF; margin-bottom: 4px; }
        .label { font-size: 13px; color: #64748b; }

        .tab-menu { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
        .tombol-tab { padding: 10px 16px; border: none; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; white-space: nowrap; font-weight:500; }
        .tombol-tab.aktif { background: #165DFF; color: white; }

        .konten-tab { display: block; }
        .konten-tab.sembunyi { display: none !important; }

        .kartu-antrean { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-baris { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .judul-item { font-weight: 600; font-size: 15px; color: #1e293b; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge.Kaveling { background: #e2e8f0; color: #475569; }
        .badge.Cluster { background: #fef3c7; color: #d97706; }
        .badge.Residence { background: #dbeafe; color: #1d4ed8; }
        .badge.Estate { background: #ede9fe; color: #7c3aed; }
        .detail { font-size: 13px; color: #64748b; margin-bottom: 12px; }
        .aksi { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-aksi { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-setuju { background: #22c55e; color: white; }
        .btn-tolak { background: #ef4444; color: white; }
        .btn-detail { background: #f59e0b; color: white; }
        .kosong { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="wadah">
    <!-- Header -->
    <div class="header-admin">
        <div>
            <h1>🛠️ Panel Admin Teravia</h1>
            <p class="info-login" id="infoAdmin"></p>
        </div>
        <button class="btn-keluar" id="btnKeluar">Keluar</button>
    </div>

    <!-- Ringkasan Cepat -->
    <div class="ringkasan">
        <div class="kartu-ringkasan">
            <div class="angka" id="jumlahListing">0</div>
            <div class="label">Listing Menunggu</div>
        </div>
        <div class="kartu-ringkasan">
            <div class="angka" id="jumlahPaket">0</div>
            <div class="label">Membership Menunggu</div>
        </div>
        <div class="kartu-ringkasan">
            <div class="angka">0</div>
            <div class="label">Listing Aktif</div>
        </div>
        <div class="kartu-ringkasan">
            <div class="angka">0</div>
            <div class="label">Total Anggota</div>
        </div>
    </div>

    <!-- Tab Menu -->
    <div class="tab-menu">
        <button class="tombol-tab aktif" data-tab="membership">💳 Membership</button>
        <button class="tombol-tab" data-tab="listing">📋 Listing</button>
        <button class="tombol-tab" data-tab="helpdesk">💬 Helpdesk</button>
    </div>

    <!-- Konten: Permintaan Membership -->
    <div id="tabMembership" class="konten-tab">
        <div id="daftarMembership"></div>
    </div>

    <!-- Konten: Permintaan Listing -->
    <div id="tabListing" class="konten-tab sembunyi">
        <div class="kosong">Fitur persetujuan listing akan disambungkan selanjutnya</div>
    </div>

    <!-- Konten: Helpdesk -->
    <div id="tabHelpdesk" class="konten-tab sembunyi">
        <div class="kosong">Belum ada pesan masuk</div>
    </div>
</div>

<script>
// === 1. CEK KEAMANAN: HARUS SUDAH LOGIN ===
// === CEK SANGAT SEDERHANA & PASTI ===
if(localStorage.getItem('adminLogin') !== 'YA_SUDAH_MASUK'){
    window.location.replace('/admin-login.html');
}

// Tampilkan info admin
document.getElementById('infoAdmin').textContent = 'Masuk sebagai: Admin Utama Teravia (Owner)';

// === 2. FUNGSI MENGAMBIL DATA DAN MENAMPILKAN ===
function muatData() {
    // Ambil permintaan paket yang menunggu
    const permintaan = JSON.parse(localStorage.getItem('permintaan_paket') || '[]').filter(p => p.status === 'menunggu');
    document.getElementById('jumlahPaket').textContent = permintaan.length;

    const wadah = document.getElementById('daftarMembership');
    if(permintaan.length === 0) {
        wadah.innerHTML = `<div class="kosong">✅ Tidak ada permintaan keanggotaan yang menunggu</div>`;
        return;
    }

    wadah.innerHTML = '';
    permintaan.forEach(p => {
        wadah.innerHTML += `
        <div class="kartu-antrean">
            <div class="info-baris">
                <div class="judul-item">${p.nama_user}</div>
                <span class="badge ${p.paket}">Paket ${p.paket}</span>
            </div>
            <div class="detail">
                Tanggal: ${new Date(p.tanggal).toLocaleDateString('id-ID')} | 
                Total: Rp ${p.harga.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".")}
            </div>
            <div class="aksi">
                <button class="btn-aksi btn-setuju" onclick="setujuiPaket(${p.id})">✅ Setujui & Aktifkan</button>
                <button class="btn-aksi btn-tolak" onclick="tolakPaket(${p.id})">❌ Tolak</button>
            </div>
        </div>`;
    });
}

// === 3. FUNGSI TINDAKAN ADMIN ===
function setujuiPaket(idPermintaan) {
    const semuaPermintaan = JSON.parse(localStorage.getItem('permintaan_paket'));
    const target = semuaPermintaan.find(p => p.id === idPermintaan);
    if(!target) return;

    // Ubah status permintaan
    target.status = 'disetujui';
    localStorage.setItem('permintaan_paket', JSON.stringify(semuaPermintaan));

    // Ubah tier paket di akun pengguna
    const semuaUser = JSON.parse(localStorage.getItem('teravia_users'));
    const user = semuaUser.find(u => u.id === target.user_id);
    if(user) {
        user.tier = target.paket;
        // Tambah masa berlaku 30 hari
        user.tanggal_berlaku = new Date(Date.now() + 30*24*60*60*1000).toISOString();
        localStorage.setItem('teravia_users', JSON.stringify(semuaUser));
    }

    alert(`✅ Berhasil! Paket ${target.paket} sudah diaktifkan untuk ${target.nama_user}`);
    muatData();
}

function tolakPaket(idPermintaan) {
    const semuaPermintaan = JSON.parse(localStorage.getItem('permintaan_paket'));
    const target = semuaPermintaan.find(p => p.id === idPermintaan);
    if(!target) return;

    target.status = 'ditolak';
    localStorage.setItem('permintaan_paket', JSON.stringify(semuaPermintaan));
    alert(`Permintaan ${target.nama_user} ditolak`);
    muatData();
}

// === 4. FUNGSI PERPINDAHAN TAB ===
document.querySelectorAll('.tombol-tab').forEach(tombol => {
    tombol.addEventListener('click', function() {
        // Hapus aktif semua tab
        document.querySelectorAll('.tombol-tab').forEach(t => t.classList.remove('aktif'));
        this.classList.add('aktif');

        // Sembunyikan semua konten
        document.querySelectorAll('.konten-tab').forEach(k => k.classList.add('sembunyi'));
        // Tampilkan yang dipilih
        document.getElementById(`tab${this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1)}`).classList.remove('sembunyi');
    });
});

// === 5. FUNGSI KELUAR ===
document.getElementById('btnKeluar').addEventListener('click', function() {
    localStorage.removeItem('adminLogin');
    window.location.replace('/admin-login.html');
});

    // ... kode fungsi lain tetap ada di sini ...

// === TARUH SCRIPT HELPDESK DI SINI ===
function muatPesanBantuan(){
    const daftar = document.getElementById('daftarPesan');
    const semuaPesan = JSON.parse(localStorage.getItem('pesanBantuan') || '[]').reverse();

    if(semuaPesan.length === 0){
        daftar.innerHTML = `<div class="kosong">✅ Belum ada pesan masuk</div>`;
        return;
    }

    daftar.innerHTML = '';
    semuaPesan.forEach(p => {
        const warna = p.status === 'baru' ? '#fef3c7' : '#f0fdf4';
        const teks = p.status === 'baru' ? 'Baru' : 'Sudah Dibaca';
        daftar.innerHTML += `
        <div class="kartu-antrean" style="background:${warna};">
            <div class="info-baris">
                <div class="judul-item">${p.subjek}</div>
                <span class="badge">${teks}</span>
            </div>
            <p style="font-size:13px;color:#666;">Dari: ${p.pengirim} | ${p.tanggal}</p>
            <p style="font-size:14px;margin:8px 0;">${p.pesan}</p>
            <div class="aksi">
                ${p.status === 'baru' ? `<button class="btn-aksi btn-setuju" onclick="tandaiSelesai(${p.id})">Tandai Selesai</button>` : ''}
                <button class="btn-aksi btn-detail" onclick="balasPesan('${p.pengirim}')">Balas via WA</button>
            </div>
        </div>`;
    });
}

function tandaiSelesai(id){
    const semua = JSON.parse(localStorage.getItem('pesanBantuan'));
    const target = semua.find(p => p.id === id);
    target.status = 'selesai';
    localStorage.setItem('pesanBantuan', JSON.stringify(semua));
    muatPesanBantuan();
}

function balasPesan(nama){
    const teks = `Halo ${nama}, terima kasih sudah menghubungi Teravia. Ada yang bisa kami bantu?`;
    window.open(`https://wa.me/?text=${encodeURIComponent(teks)}`, '_blank');
}

// Jalankan saat tab diklik
document.querySelector('[data-tab="helpdesk"]').addEventListener('click', muatPesanBantuan);
</script>
    
muatData();
</script>
</body>
</html>
