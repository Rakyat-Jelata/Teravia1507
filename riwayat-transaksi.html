<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
        .wadah { max-width: 720px; width: 90%; margin: 32px auto; padding: 0 16px; }
        .kartu { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }
        .judul { font-size: 22px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #F1F5F9; }
        .item-transaksi { padding: 14px 0; border-bottom: 1px solid #F1F5F9; }
        .item-transaksi:last-child { border: none; padding-bottom: 0; }
        .baris-atas { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .jenis { font-weight: 600; font-size: 15px; }
        .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status.lunas { background:#ECFDF5; color:#065F46; }
        .status.tunggu { background:#FFFBEB; color:#92400E; }
        .status.gagal { background:#FEF2F2; color:#DC2626; }
        .baris-bawah { display: flex; justify-content: space-between; font-size: 13px; color:#64748B; margin-top: 4px; }
        .kosong { text-align: center; padding: 30px; color:#94A3B8; }
    </style>
</head>
<body>
<nav style="background:white;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:99;">
    <div style="max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <img src="assets/img/logo.png" alt="Teravia" style="height:32px;">
            <span style="font-weight:700;font-size:18px;color:#1E293B;">Teravia</span>
        </a>
        <button id="btnHamburger" style="background:none;border:none;font-size:24px;cursor:pointer;display:none;">☰</button>
        <div id="menuNav" style="display:flex;gap:24px;align-items:center;">
            <a href="index.html" style="text-decoration:none;color:#64748B;font-weight:500;">Beranda</a>
            <a href="daftar-properti.html" style="text-decoration:none;color:#64748B;font-weight:500;">Properti</a>
            <a href="profil-member.html" style="text-decoration:none;color:#165DFF;font-weight:600;">Profil</a>
        </div>
    </div>
</nav>

<main class="wadah">
    <div class="kartu">
        <h1 class="judul">📜 Riwayat Transaksi</h1>
        <div id="daftarTransaksi">
            <div class="kosong">
                <p>Belum ada riwayat transaksi.</p>
            </div>
        </div>
    </div>
</main>

<script>
// Hamburger Menu
const btnHam = document.getElementById('btnHamburger');
const menuNav = document.getElementById('menuNav');
function aturMenu() {
    if(window.innerWidth <= 768) {
        btnHam.style.display = 'block';
        menuNav.style.display = 'none';
        menuNav.style.flexDirection = 'column';
        menuNav.style.position = 'absolute';
        menuNav.style.top = '100%';
        menuNav.style.left = '0';
        menuNav.style.width = '100%';
        menuNav.style.background = 'white';
        menuNav.style.padding = '16px';
        menuNav.style.boxShadow = '0 4px 8px rgba(0,0,0,0.1)';
    } else {
        btnHam.style.display = 'none';
        menuNav.style.display = 'flex';
        menuNav.style.position = 'static';
        menuNav.style.boxShadow = 'none';
    }
}
btnHam.addEventListener('click', () => menuNav.style.display = menuNav.style.display === 'flex' ? 'none' : 'flex');
window.addEventListener('resize', aturMenu);
aturMenu();

// Cek Login
const sesi = JSON.parse(localStorage.getItem('sesiTeravia') || 'null');
if(!sesi) { alert('⚠️ Silakan masuk dulu!'); location.href='login.html'; }

// Contoh Data (bisa diganti data nyata dari localStorage)
const riwayat = JSON.parse(localStorage.getItem('riwayatTransaksi') || '[]');
if(riwayat.length > 0) {
    const wadah = document.getElementById('daftarTransaksi');
    wadah.innerHTML = '';
    riwayat.forEach(item => {
        wadah.innerHTML += `
        <div class="item-transaksi">
            <div class="baris-atas">
                <span class="jenis">${item.jenis}</span>
                <span class="status ${item.status}">${item.status.toUpperCase()}</span>
            </div>
            <div class="baris-bawah">
                <span>${item.noInv}</span>
                <span>Rp ${item.total.toLocaleString('id-ID')}</span>
            </div>
            <div class="baris-bawah">
                <span>${item.tanggal}</span>
            </div>
        </div>`;
    });
}
</script>
</body>
</html>
