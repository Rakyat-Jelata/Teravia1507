<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bantuan - Teravia</title>
    <link rel="stylesheet" href="assets/css/general.css">
    <style>
        .wadah{max-width:600px;margin:30px auto;padding:0 16px;}
        .kartu{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
        h2{color:#165DFF;margin-bottom:16px;}
        .grup{margin-bottom:12px;}
        label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;}
        input, textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;}
        textarea{min-height:120px;resize:vertical;}
        button{width:100%;padding:13px;background:#165DFF;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
        .info{margin-top:12px;font-size:13px;color:#666;text-align:center;}
    </style>
</head>
<body>
<div class="wadah">
    <div class="kartu">
        <h2>💬 Hubungi Bantuan</h2>
        <p style="margin-bottom:16px;color:#666;">Ada pertanyaan atau kendala? Silakan tulis di bawah ini, kami akan bantu secepatnya.</p>
        
        <form id="formBantuan">
            <div class="grup">
                <label>Subjek Masalah</label>
                <input type="text" id="subjek" placeholder="Contoh: Masalah Pembayaran / Login" required>
            </div>
            <div class="grup">
                <label>Isi Pesan</label>
                <textarea id="pesan" placeholder="Jelaskan secara rinci kendala yang kamu alami..." required></textarea>
            </div>
            <button type="submit">Kirim Pesan</button>
        </form>

        <div class="info">
            <a href="index.html">← Kembali ke Beranda</a>
        </div>
    </div>
</div>

<script>
// Cek apakah sudah login
const sesi = JSON.parse(localStorage.getItem('sesiTeravia') || 'null');
if(!sesi) return alert('Silakan masuk dulu!') && (window.location.href = 'login.html');

document.getElementById('formBantuan').addEventListener('submit', function(e){
    e.preventDefault();
    const subjek = document.getElementById('subjek').value.trim();
    const pesan = document.getElementById('pesan').value.trim();

    // Simpan pesan
    const semuaPesan = JSON.parse(localStorage.getItem('pesanBantuan') || '[]');
    semuaPesan.push({
        id: Date.now(),
        pengirim: sesi.nama,
        email: sesi.email || '-',
        subjek: subjek,
        pesan: pesan,
        status: 'baru',
        tanggal: new Date().toLocaleString('id-ID')
    });
    localStorage.setItem('pesanBantuan', JSON.stringify(semuaPesan));

    alert('✅ Pesan berhasil dikirim! Admin akan segera merespons.');
    window.location.reload();
});
</script>
</body>
</html>
