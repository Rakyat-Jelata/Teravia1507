<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Kata Sandi - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
        .wadah { max-width: 480px; width: 90%; margin: 32px auto; padding: 0 16px; }
        .kartu { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .judul { font-size: 22px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #F1F5F9; }
        .grup-input { margin-bottom: 16px; position: relative; }
        .grup-input label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .grup-input input { width: 100%; padding: 12px 44px 12px 12px; border: 1px solid #CBD5E1; border-radius: 10px; font-size: 15px; }
        .grup-input input:focus { outline: none; border-color: #165DFF; box-shadow: 0 0 0 3px rgba(22,93,255,0.1); }
        .tombol-mata { position: absolute; right: 12px; top: 38px; background: none; border: none; font-size: 18px; cursor: pointer; color: #94A3B8; }
        .tombol { width: 100%; padding: 13px; background: #165DFF; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .tombol:hover { background: #0F42C1; }
        .kembali { display: block; text-align: center; margin-top: 16px; color: #64748B; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<!-- NAVIGASI SAMA PERSIS -->
<nav style="background:white;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:99;">
    <div style="max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <img src="assets/img/logo.png" alt="Teravia" style="height:32px;">
            <span style="font-weight:700;font-size:18px;color:#1E293B;">Teravia</span>
        </a>
        <button id="btnHamburger" style="background:none;border:none;font-size:24px;cursor:pointer;display:none;">☰</button>
        <div id="menuNav" style="display:flex;gap:24px;align-items:center;">
            <a href="index.html" style="text-decoration:none;color:#64748B;font-weight:500;">Beranda</a>
            <a href="daftar-properti.html" style="text-decoration:none;color:#64748B;font-weight:500;">Properti</a>
            <a href="profil-member.html" style="text-decoration:none;color:#165DFF;font-weight:600;">Profil</a>
        </div>
    </div>
</nav>

<main class="wadah">
    <div class="kartu">
        <h1 class="judul">🔒 Ganti Kata Sandi</h1>
        <form id="formGanti">
            <div class="grup-input">
                <label>Kata Sandi Lama</label>
                <input type="password" id="sandiLama" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('sandiLama', this)">👁️</button>
            </div>
            <div class="grup-input">
                <label>Kata Sandi Baru</label>
                <input type="password" id="sandiBaru" minlength="6" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('sandiBaru', this)">👁️</button>
            </div>
            <div class="grup-input">
                <label>Konfirmasi Sandi Baru</label>
                <input type="password" id="konfirmasi" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('konfirmasi', this)">👁️</button>
            </div>
            <button type="submit" class="tombol">Simpan Perubahan</button>
        </form>
        <a href="profil-member.html" class="kembali">← Kembali ke Profil</a>
    </div>
</main>

<script>
// === HAMBURGER MENU ===
const btnHam = document.getElementById('btnHamburger');
const menuNav = document.getElementById('menuNav');
function aturMenu() {
    if(window.innerWidth <= 768) {
        btnHam.style.display = 'block';
        menuNav.style.display = 'none';
        menuNav.style.flexDirection = 'column';
        menuNav.style.position = 'absolute';
        menuNav.style.top = '100%';
        menuNav.style.left = '0';
        menuNav.style.width = '100%';
        menuNav.style.background = 'white';
        menuNav.style.padding = '16px';
        menuNav.style.boxShadow = '0 4px 8px rgba(0,0,0,0.1)';
    } else {
        btnHam.style.display = 'none';
        menuNav.style.display = 'flex';
        menuNav.style.position = 'static';
        menuNav.style.boxShadow = 'none';
    }
}
btnHam.addEventListener('click', () => {
    menuNav.style.display = menuNav.style.display === 'flex' ? 'none' : 'flex';
});
window.addEventListener('resize', aturMenu);
aturMenu();

// === LOGIKA ===
const sesi = JSON.parse(localStorage.getItem('sesiTeravia') || 'null');
if(!sesi) { alert('Silakan masuk dulu!'); location.href='login.html'; }

function toggleSandi(id, el) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

document.getElementById('formGanti').addEventListener('submit', e => {
    e.preventDefault();
    const lama = document.getElementById('sandiLama').value;
    const baru = document.getElementById('sandiBaru').value;
    const konf = document.getElementById('konfirmasi').value;

    if(lama !== sesi.kataSandi) return alert('Kata sandi lama salah!');
    if(baru !== konf) return alert('Konfirmasi sandi tidak cocok!');
    
    sesi.kataSandi = baru;
    localStorage.setItem('sesiTeravia', JSON.stringify(sesi));
    alert('✅ Kata sandi berhasil diperbarui!');
    location.href = 'profil-member.html';
});
</script>
</body>
</html>
