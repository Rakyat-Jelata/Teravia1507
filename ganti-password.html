<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/ganti-sandi.css">
</head>
<body>

<!-- NAVBAR SERAGAM STANDAR -->
<nav class="navbar">
    <div class="wadah-nav">
        <a href="index.html" class="logo">
            <img src="assets/img/logo.png" alt="Teravia" style="height:32px;">
        </a>
        <div class="menu-desktop">
            <a href="index.html" class="tautan-nav">Beranda</a>
            <a href="daftar-properti.html" class="tautan-nav">Cari Properti</a>
            <a href="profil-member.html" class="tautan-nav aktif">Profil Saya</a>
        </div>
        <button type="button" id="tombolMenu" class="tombol-hamburger" aria-label="Buka Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<!-- MENU SAMPING SERAGAM -->
<div id="latarGelap" class="latar-gelap"></div>
<div id="menuMobile" class="menu-samping">
    <div class="tutup-menu">
        <button type="button" id="tombolTutup" aria-label="Tutup Menu">✕</button>
    </div>
    <div class="isi-menu">
        <a href="index.html" class="tautan-menu">🏠 Beranda</a>
        <a href="daftar-properti.html" class="tautan-menu">🔍 Cari Properti</a>
        <a href="profil-member.html" class="tautan-menu aktif">👤 Profil Saya</a>
        <div class="garis-pemisah"></div>
        <a href="login.html" class="tautan-menu">👤 Masuk</a>
    </div>
</div>

<!-- ISI HALAMAN -->
<main class="wadah">
    <div class="kartu">
        <h1 class="judul">🔒 Ganti Kata Sandi</h1>
        <form id="formGanti">
            <div class="grup-input">
                <label>Kata Sandi Lama</label>
                <input type="password" id="sandiLama" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('sandiLama', this)">👁️</button>
            </div>
            <div class="grup-input">
                <label>Kata Sandi Baru</label>
                <input type="password" id="sandiBaru" minlength="6" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('sandiBaru', this)">👁️</button>
            </div>
            <div class="grup-input">
                <label>Konfirmasi Sandi Baru</label>
                <input type="password" id="konfirmasi" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('konfirmasi', this)">👁️</button>
            </div>
            <button type="submit" class="tombol">Simpan Perubahan</button>
        </form>
        <a href="profil-member.html" class="kembali">← Kembali ke Profil</a>
    </div>
</main>

<!-- FOOTER SERAGAM -->
<footer class="footer">
    <div class="container">
        <div class="footer-bawah">
            <p>&copy; 2026 Teravia. Hak Cipta Dilindungi Undang-Undang.</p>
        </div>
    </div>

</body>
</html>
