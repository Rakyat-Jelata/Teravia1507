<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <!-- Library untuk membuat PDF otomatis -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        .wadah{max-width:600px;margin:20px auto;padding:0 16px;}
        .invoice{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
        .kepala{text-align:center;margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:16px;}
        .logo{height:40px;margin-bottom:8px;}
        .no-invoice{font-size:14px;color:#666;margin-bottom:12px;}
        .status{display:inline-block;padding:6px 12px;border-radius:20px;font-weight:bold;font-size:14px;}
        .status.menunggu{background:#fef3c7;color:#92400e;}
        .status.sukses{background:#f0fdf4;color:#166534;}
        .bagian{margin:16px 0;}
        .bagian h4{margin-bottom:8px;color:#333;}
        .baris{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;}
        .total{border-top:2px solid #eee;padding-top:12px;margin-top:12px;}
        .total .nilai{font-size:20px;font-weight:bold;color:#16a34a;}
        .tombol-grup{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
        .tombol-grup button{flex:1;min-width:140px;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
        .btn-wa{background:#25d366;color:white;}
        .btn-email{background:#3b82f6;color:white;}
        .btn-kembali{background:#f3f4f6;color:#333;}
    </style>
</head>
<body>
<div class="wadah">
    <div class="invoice" id="isiInvoice">
        <!-- Data invoice dimuat di sini -->
    </div>

    <div class="tombol-grup">
        <button class="btn-wa" onclick="kirimKeWA()">📲 Kirim ke WhatsApp</button>
        <button class="btn-email" onclick="kirimKeEmail()">📧 Kirim ke Email</button>
    </div>
    <p style="text-align:center;margin-top:12px;"><a href="profile-member.html" class="btn-kembali">Kembali ke Profil</a></p>
</div>

<script>
// Cek login
const sesi = JSON.parse(localStorage.getItem('sesiTeravia') || 'null');
if(!sesi) { alert('Silakan masuk dulu!'); location.href='login.html'; }

// Ambil data dari URL
const params = new URLSearchParams(window.location.search);
const jenis = params.get('jenis'); // 'upgrade' atau 'ads'
const id = params.get('id');

let dataPesanan = null;
if(jenis === 'upgrade'){
    const antrian = JSON.parse(localStorage.getItem('permintaanUpgrade') || '[]');
    dataPesanan = antrian.find(p => p.id == id);
} else if(jenis === 'ads'){
    const pesanan = JSON.parse(localStorage.getItem('pesananAds') || '[]');
    dataPesanan = pesanan.find(p => p.id == id);
}

if(!dataPesanan){
    document.getElementById('isiInvoice').innerHTML = `<p style="text-align:center;color:red;">Data invoice tidak ditemukan!</p>`;
} else {
    tampilkanInvoice(dataPesanan, jenis);
}

function tampilkanInvoice(data, jenis){
    const noInv = `INV-${jenis.toUpperCase()}-${data.id}`;
    let judul = '', rincian = '', total = data.biaya || 0;

    if(jenis === 'upgrade'){
        judul = `Upgrade ke Paket ${data.paketTujuan}`;
        rincian = `<div class="baris"><span>Layanan</span><span>Paket Keanggotaan ${data.paketTujuan}</span></div>`;
        total = data.harga || 0; // Bisa disesuaikan harga paket nanti
    } else {
        judul = `Promosi Meta Ads: ${data.judulIklan}`;
        rincian = `
        <div class="baris"><span>Durasi</span><span>${data.durasiHari} Hari</span></div>
        <div class="baris"><span>ID Iklan</span><span>${data.idIklan}</span></div>
        `;
        total = data.biaya;
    }

    document.getElementById('isiInvoice').innerHTML = `
    <div class="kepala">
        <img src="assets/img/logo.png" alt="Teravia" class="logo">
        <h2>INVOICE PEMBAYARAN</h2>
        <div class="no-invoice">No: ${noInv} | Tanggal: ${data.tanggal}</div>
        <span class="status menunggu">Menunggu Verifikasi</span>
    </div>

    <div class="bagian">
        <h4>Tagihan Kepada:</h4>
        <div class="baris"><span>Nama</span><span>${sesi.nama || sesi.username}</span></div>
        <div class="baris"><span>ID Pengguna</span><span>${sesi.id}</span></div>
    </div>

    <div class="bagian">
        <h4>Rincian Pembayaran:</h4>
        <div class="baris"><span>Deskripsi</span><span>${judul}</span></div>
        ${rincian}
    </div>

    <div class="total">
        <div class="baris"><span>Total Pembayaran</span></div>
        <div class="nilai">Rp ${total.toLocaleString('id-ID')}</div>
    </div>

    <div class="bagian" style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;">
        <h4>Metode Pembayaran:</h4>
        <div class="baris"><span>Bank BCA</span><span>1234567890</span></div>
        <div class="baris"><span>a.n</span><span>Teravia Properti</span></div>
    </div>
    `;
}

// Fungsi Kirim ke WhatsApp
function kirimKeWA(){
    const teks = `*INVOICE TERAVIA*%0A
No: ${document.querySelector('.no-invoice').textContent}%0A
Jenis: ${jenis === 'upgrade' ? 'Upgrade Paket' : 'Promosi Iklan'}%0A
Total: ${document.querySelector('.nilai').textContent}%0A%0A
Silakan bayar ke BCA 1234567890 a.n Teravia.%0A
Konfirmasi setelah transfer ya!`;
    window.open(`https://wa.me/6281234567890?text=${teks}`, '_blank');
    alert('Membuka WhatsApp...');
}

// Fungsi Kirim ke Email (Buka aplikasi email pengguna)
function kirimKeEmail(){
    const subjek = `Invoice Pembayaran Teravia - ${jenis === 'upgrade' ? 'Upgrade Paket' : 'Promosi Iklan'}`;
    const isi = `Nomor Invoice: ${document.querySelector('.no-invoice').textContent}\nTotal: ${document.querySelector('.nilai').textContent}\n\nSilakan lakukan pembayaran ke BCA 1234567890 a.n Teravia.`;
    window.location.href = `mailto:?subject=${encodeURIComponent(subjek)}&body=${encodeURIComponent(isi)}`;
    alert('Membuka aplikasi email...');
}
</script>
</body>
</html>
