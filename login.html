<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login">

<div class="wadah-login">
    <div class="kotak-login">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Masuk Akun</h2>

        <form id="formLogin" class="form-login">
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi" placeholder="Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Masuk Sekarang</button>

            <div class="tautan-daftar">
                Belum punya akun? <a href="register.html">Daftar Baru</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<!-- KONEKSI SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Koneksi Database
const SUPABASE_URL = "https://jvzrhjlwaysbsqyawnci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2enJoamx3YXlzYnNxeWF3bmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODkyMzYsImV4cCI6MjA5OTc2NTIzNn0.rnc5A6xABjEMI0pG-g0hCCRdFK0Om2UspFjTjOkCzeU";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Fungsi Lihat/Sembunyi Sandi
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// Proses Masuk
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formLogin');
    if(!form) return;

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const sandi = document.getElementById('sandi').value;

        try {
            // PERBAIKAN: Cari berdasarkan email dulu, baru cek sandi
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .limit(1)
                .single();

            if(error) throw new Error("Akun tidak ditemukan!");
            
            // Cek kesesuaian sandi di sisi klien
            if(data.sandi !== sandi) throw new Error("Kata sandi salah!");

            // Simpan sesi
            localStorage.setItem('sesiTeravia', JSON.stringify({
                id: data.id,
                username: data.username,
                nama: data.nama_lengkap,
                paket: data.paket_aktif || 'Kaveling',
                is_admin: data.is_admin || false
            }));

            alert("✅ Berhasil Masuk!");
            window.location.href = data.is_admin ? "admin-dashboard.html" : "index.html";

        } catch (err) {
            console.error(err);
            alert("❌ " + (err.message || "Terjadi kesalahan saat masuk"));
        }
    });
});
</script>
</body>
</html>
