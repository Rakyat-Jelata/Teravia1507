<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login">

<div class="wadah-login">
    <div class="kotak-login">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Masuk Akun</h2>

        <form id="formLogin" class="form-login">
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi" placeholder="Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Masuk Sekarang</button>

            <div class="tautan-daftar">
                Belum punya akun? <a href="registrasi.html">Daftar Baru</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<!-- ==============================================
✅ BAGIAN INI ADALAH SCRIPT SUPABASE UNTUK LOGIN
============================================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 1. KONEKSI KE DATABASE
const SUPABASE_URL = "https://jvzrhjlwaysbsqyawnci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // biarkan kunci yang sudah ada
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Fungsi sembunyi/tampil sandi
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// 2. TUNGGU HALAMAN SIAP BARU PASANG TOMBOL
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('formLogin').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const sandi = document.getElementById('sandi').value;

        try {
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('sandi', sandi)
                .single();

            if(error || !data) {
                return alert("❌ Email atau sandi salah!");
            }

            localStorage.setItem('sesiTeravia', JSON.stringify({
                id: data.id,
                username: data.username,
                nama: data.nama_lengkap,
                is_admin: data.is_admin
            }));

            alert("✅ Berhasil masuk!");
            window.location.href = data.is_admin ? "admin-dashboard.html" : "index.html";

        } catch (err) {
            alert("❌ Kesalahan: " + err.message);
        }
    });
});
</script>

</body>
</html>
