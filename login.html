<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login">

<div class="wadah-login">
    <div class="kotak-login">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Masuk Akun</h2>

        <form id="formLogin" class="form-login">
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi" placeholder="Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Masuk Sekarang</button>

            <div class="tautan-daftar">
                Belum punya akun? <a href="register.html">Daftar Baru</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<!-- KONEKSI SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// === KONEKSI SUPABASE (SUDAH BENAR) ===
const SUPABASE_URL = "https://jvzrhjlwaysbsqyawnci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2enJoamx3YXlzYnNxeWF3bmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODkyMzYsImV4cCI6MjA5OTc2NTIzNn0.rnc5A6xABjEMI0pG-g0hCCRdFK0Om2UspFjTjOkCzeU";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// === FUNGSI LIHAT/SEMBUNYI SANDI ===
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// === PROSES LOGIN ===
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formLogin');
    if(!form) return;

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const sandi = document.getElementById('sandi').value;

        try {
            // ✅ KHUSUS AKUN TRIAL KAMU (BYPASS AMAN)
            if (email === 'teravia.vip@gmail.com' && sandi === 'TeraviaVip@2026') {
                const sesiTrial = {
                    id: 'trial-001',
                    nama_lengkap: 'Teravia VIP',
                    email: email,
                    paket_aktif: 'Estate Premium', // Langsung Premium
                    jenis_akun: 'broker',
                    is_admin: false,
                    status_login: true
                };
                localStorage.setItem('sesiTeravia', JSON.stringify(sesiTrial));
                alert('✅ Berhasil Masuk! Selamat datang Member Estate Premium!');
                window.location.href = 'index.html';
                return;
            }

            // ✅ LOGIN DARI DATABASE SUPABASE (AMAN)
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .limit(1)
                .single();

            if (error || !data) throw new Error("Email tidak terdaftar!");
            if (data.sandi !== sandi) throw new Error("Kata sandi salah!");

            // Simpan sesi dari database
            localStorage.setItem('sesiTeravia', JSON.stringify({
                id: data.id,
                nama_lengkap: data.nama_lengkap,
                email: data.email,
                paket_aktif: data.paket_aktif || 'Kaveling',
                jenis_akun: data.jenis_akun || 'pemilik',
                is_admin: data.is_admin || false,
                status_login: true
            }));

            alert("✅ Berhasil Masuk!");
            window.location.href = data.is_admin ? "admin-dashboard.html" : "index.html";

        } catch (err) {
            console.error("Error Login:", err);
            alert("❌ " + err.message);
        }
    });
});

</script>
</body>
</html>
