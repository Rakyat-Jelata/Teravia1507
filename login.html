<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login">

<div class="wadah-login">
    <div class="kotak-login">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Masuk Akun</h2>

        <form id="formLogin" class="form-login">
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi" placeholder="Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Masuk Sekarang</button>

            <div class="tautan-daftar">
                Belum punya akun? <a href="register.html">Daftar Baru</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<!-- KONEKSI SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/sesi.js"></script>
<script>
// === FUNGSI LIHAT/SEMBUNYI SANDI ===
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// === PROSES LOGIN (PASTI JALAN) ===
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formLogin');
    if(!form) return;

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const sandi = document.getElementById('sandi').value;

        try {
            // ✅ AKUN TRIAL KAMU - PASTI BERHASIL
            if (email === 'teravia.vip@gmail.com' && sandi === 'TeraviaVip@2026') {
                const sesiTrial = {
                    id: 'trial-001',
                    nama_lengkap: 'Teravia VIP',
                    email: email,
                    paket_aktif: 'Estate Premium',
                    jenis_akun: 'broker',
                    is_admin: false,
                    status_login: true
                };
                localStorage.setItem('sesiTeravia', JSON.stringify(sesiTrial));
                alert('✅ BERHASIL MASUK! Selamat datang Member Estate Premium!');
                
                // Kembali ke halaman tujuan atau beranda
                const tujuan = localStorage.getItem('tujuanSetelahLogin') || 'index.html';
                localStorage.removeItem('tujuanSetelahLogin');
                window.location.href = tujuan;
                return;
            }

            // ❌ Akun lain
            alert('❌ Gunakan akun trial dulu:\nEmail: teravia.vip@gmail.com\nSandi: TeraviaVip@2026');

        } catch (err) {
            console.error('Error:', err);
            alert('❌ Kesalahan: ' + err.message);
        }
    });
});

</script>
    
</body>
</html>
