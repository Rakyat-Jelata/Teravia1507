<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Teravia</title>
    <link rel="icon" href="/assets/img/logo.png">
<link rel="stylesheet" href="/assets/css/general.css">
<link rel="stylesheet" href="/assets/css/auth.css">

</head>
<body class="halaman-login">

<!-- HANYA SATU LOGO DI ATAS FORM, TIDAK ADA DI NAVBAR -->
<div class="wadah-login">
    <div class="kotak-login">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Masuk</h2>

        <form class="form-login">
            <div class="grup-input">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="grup-input">
                <input type="password" placeholder="Kata Sandi" required>
            </div>

            <div class="opsi-bawah">
                <label class="ingat-saya">
                    <input type="checkbox"> Ingat Saya
                </label>
                <a href="#" class="lupa-sandi">Lupa Kata Sandi?</a>
            </div>

            <button type="submit" class="btn-masuk">Masuk</button>

            <div class="tautan-daftar">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
