<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Lokasi - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
        .wadah { max-width: 720px; width: 90%; margin: 32px auto; padding: 0 16px; }
        .kartu { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .judul { font-size: 22px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #F1F5F9; display:flex; align-items:center; gap:10px; }
        .tombol-kembali { color:#165DFF; text-decoration:none; font-size:14px; font-weight:500; }
        .item-lokasi { padding:14px 0; border-bottom:1px solid #F1F5F9; cursor:pointer; transition:0.1s; }
        .item-lokasi:last-child { border:none; }
        .item-lokasi:hover { padding-left:8px; color:#165DFF; }
        .loading { text-align:center; padding:30px; color:#64748B; }
        .breadcrumb { font-size:13px; color:#64748B; margin-bottom:12px; }
        .breadcrumb span { margin:0 6px; }
    </style>
</head>
<body>

<!-- NAVBAR SERAGAM -->
<nav style="background:white;box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:99;">
    <div style="max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <img src="assets/img/logo.png" alt="Teravia" style="height:32px;">
            <span style="font-weight:700;font-size:18px;color:#1E293B;">Teravia</span>
        </a>
        <button id="btnHamburger" style="background:none;border:none;font-size:24px;cursor:pointer;display:none;">☰</button>
        <div id="menuNav" style="display:flex;gap:24px;align-items:center;">
            <a href="index.html" style="text-decoration:none;color:#64748B;font-weight:500;">Beranda</a>
            <a href="daftar-properti.html" style="text-decoration:none;color:#64748B;font-weight:500;">Cari Properti</a>
            <a href="peta-lokasi.html" style="text-decoration:none;color:#64748B;font-weight:500;">Peta Lokasi</a>
            <a href="mitra-notaris.html" style="text-decoration:none;color:#64748B;font-weight:500;">Mitra Notaris</a>
            <a href="blog.html" style="text-decoration:none;color:#64748B;font-weight:500;">Blog Properti</a>
            <a href="tentang.html" style="text-decoration:none;color:#64748B;font-weight:500;">Tentang Kami</a>
            <a href="pages/pasang-iklan.html" style="padding:8px 14px;background:#165DFF;color:white;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;">+ Pasang Iklan</a>
            <a href="login.html" style="text-decoration:none;color:#64748B;font-weight:500;">Masuk</a>
            <a href="register.html" style="padding:8px 14px;background:#EFF6FF;color:#165DFF;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;">Daftar</a>
        </div>
    </div>
</nav>

<main class="wadah">
    <div class="kartu">
        <div class="judul">
            <a href="index.html" class="tombol-kembali">← Kembali</a>
            <span id="judulHalaman">Pilih Lokasi</span>
        </div>
        <div id="jalurLokasi" class="breadcrumb"></div>
        <div id="daftarLokasi">
            <div class="loading">Memuat data lokasi...</div>
        </div>
    </div>
</main>

<script>
// === HAMBURGER MENU ===
const btnHam = document.getElementById('btnHamburger');
const menuNav = document.getElementById('menuNav');
function aturMenu() {
    if(window.innerWidth <= 768) {
        btnHam.style.display = 'block';
        menuNav.style.display = 'none';
        menuNav.style.flexDirection = 'column';
        menuNav.style.position = 'absolute';
        menuNav.style.top = '100%';
        menuNav.style.left = '0';
        menuNav.style.width = '100%';
        menuNav.style.background = 'white';
        menuNav.style.padding = '16px';
        menuNav.style.boxShadow = '0 4px 8px rgba(0,0,0,0.1)';
    } else {
        btnHam.style.display = 'none';
        menuNav.style.display = 'flex';
        menuNav.style.position = 'static';
        menuNav.style.boxShadow = 'none';
    }
}
btnHam.addEventListener('click', () => menuNav.style.display = menuNav.style.display === 'flex' ? 'none' : 'flex');
window.addEventListener('resize', aturMenu);
aturMenu();

// === KONFIGURASI API EMSIFA (SAMA PERSIS DENGAN pasang-iklan.html) ===
const BASE_API = "https://api.emsifa.com/api/wilayah"; // SESUAIKAN DENGAN ALAMAT YANG KAMU PAKAI DI pasang-iklan.html
const wadah = document.getElementById('daftarLokasi');
const judul = document.getElementById('judulHalaman');
const jalur = document.getElementById('jalurLokasi');

// Baca parameter dari URL
const url = new URLSearchParams(window.location.search);
const provinsiId = url.get('provinsi_id');
const kabupatenId = url.get('kabupaten_id');
const kecamatanId = url.get('kecamatan_id');
const namaProv = url.get('provinsi') || '';
const namaKab = url.get('kabupaten') || '';
const namaKec = url.get('kecamatan') || '';

// === FUNGSI AMBIL DATA DARI API EMSIFA ===
async function ambilData(endpoint, id = '') {
    try {
        const res = await fetch(`${BASE_API}/${endpoint}/${id}`);
        if(!res.ok) throw new Error('Gagal memuat');
        return await res.json();
    } catch (err) {
        wadah.innerHTML = `<p style="text-align:center;color:red;">Gagal memuat data lokasi. Coba lagi nanti.</p>`;
        return [];
    }
}

// === TAMPILKAN SESUAI TINGKAT LOKASI ===
async function tampilkanLokasi() {
    wadah.innerHTML = `<div class="loading">Memuat...</div>`;

    if(!provinsiId) {
        // TAMPILKAN SEMUA PROVINSI
        judul.textContent = "Pilih Provinsi";
        jalur.innerHTML = "";
        const provinsi = await ambilData('provinsi');
        wadah.innerHTML = "";
        provinsi.forEach(item => {
            wadah.innerHTML += `
            <div class="item-lokasi" onclick="pilihProvinsi('${item.id}', '${item.name}')">
                ${item.name}
            </div>`;
        });
    } 
    else if(provinsiId && !kabupatenId) {
        // TAMPILKAN KABUPATEN/KOTA DARI PROVINSI YANG DIPILIH
        judul.textContent = `Pilih Kabupaten/Kota di ${namaProv}`;
        jalur.innerHTML = `<a href="wilayah.html" style="color:#165DFF;text-decoration:none;">Provinsi</a> <span>›</span> ${namaProv}`;
        const kabupaten = await ambilData('kabupaten', provinsiId);
        wadah.innerHTML = "";
        kabupaten.forEach(item => {
            wadah.innerHTML += `
            <div class="item-lokasi" onclick="pilihKabupaten('${item.id}', '${item.name}')">
                ${item.name}
            </div>`;
        });
    }
    else if(provinsiId && kabupatenId && !kecamatanId) {
        // TAMPILKAN KECAMATAN
        judul.textContent = `Pilih Kecamatan di ${namaKab}`;
        jalur.innerHTML = `<a href="wilayah.html" style="color:#165DFF;text-decoration:none;">Provinsi</a> <span>›</span> 
                          <a href="wilayah.html?provinsi_id=${provinsiId}&provinsi=${encodeURIComponent(namaProv)}" style="color:#165DFF;text-decoration:none;">${namaProv}</a> <span>›</span> ${namaKab}`;
        const kecamatan = await ambilData('kecamatan', kabupatenId);
        wadah.innerHTML = "";
        kecamatan.forEach(item => {
            wadah.innerHTML += `
            <div class="item-lokasi" onclick="pilihKecamatan('${item.id}', '${item.name}')">
                ${item.name}
            </div>`;
        });
    }
    else if(provinsiId && kabupatenId && kecamatanId) {
        // TAMPILKAN KELURAHAN/DESA
        judul.textContent = `Pilih Kelurahan/Desa di ${namaKec}`;
        jalur.innerHTML = `<a href="wilayah.html" style="color:#165DFF;text-decoration:none;">Provinsi</a> <span>›</span> 
                          <a href="wilayah.html?provinsi_id=${provinsiId}&provinsi=${encodeURIComponent(namaProv)}" style="color:#165DFF;text-decoration:none;">${namaProv}</a> <span>›</span> 
                          <a href="wilayah.html?provinsi_id=${provinsiId}&kabupaten_id=${kabupatenId}&provinsi=${encodeURIComponent(namaProv)}&kabupaten=${encodeURIComponent(namaKab)}" style="color:#165DFF;text-decoration:none;">${namaKab}</a> <span>›</span> ${namaKec}`;
        const kelurahan = await ambilData('desa', kecamatanId);
        wadah.innerHTML = "";
        kelurahan.forEach(item => {
            wadah.innerHTML += `
            <div class="item-lokasi" onclick="bukaProperti('${item.name}')">
                ${item.name}
            </div>`;
        });
    }
}

// === FUNGSI PINDAH HALAMAN ===
function pilihProvinsi(id, nama) {
    location.href = `wilayah.html?provinsi_id=${id}&provinsi=${encodeURIComponent(nama)}`;
}
function pilihKabupaten(id, nama) {
    location.href = `wilayah.html?provinsi_id=${provinsiId}&provinsi=${encodeURIComponent(namaProv)}&kabupaten_id=${id}&kabupaten=${encodeURIComponent(nama)}`;
}
function pilihKecamatan(id, nama) {
    location.href = `wilayah.html?provinsi_id=${provinsiId}&kabupaten_id=${kabupatenId}&provinsi=${encodeURIComponent(namaProv)}&kabupaten=${encodeURIComponent(namaKab)}&kecamatan_id=${id}&kecamatan=${encodeURIComponent(nama)}`;
}
function bukaProperti(namaKel) {
    // Buka daftar properti dengan filter lengkap
    location.href = `daftar-properti.html?provinsi=${encodeURIComponent(namaProv)}&kabupaten=${encodeURIComponent(namaKab)}&kecamatan=${encodeURIComponent(namaKec)}&kelurahan=${encodeURIComponent(namaKel)}`;
}

// JALANKAN SAAT HALAMAN DIBUKA
tampilkanLokasi();
</script>
</body>
</html>
