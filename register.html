<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login halaman-daftar">

<div class="wadah-login">
    <div class="kotak-login kotak-daftar">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Daftar Akun</h2>

        <form id="formDaftar" class="form-login form-daftar">
            <div class="grup-input">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="grup-input">
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>
            <div class="grup-input">
                <input type="tel" id="nohp" placeholder="Nomor WhatsApp" required>
            </div>
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>

            <div class="grup-input sandi-grup">
                <input type="password" id="sandi1" placeholder="Kata Sandi" required>
                <button type="button" onclick="ubahSandi('sandi1', this)">👁️</button>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi2" placeholder="Ulangi Kata Sandi" required>
                <button type="button" onclick="ubahSandi('sandi2', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Daftar Sekarang</button>

            <div class="tautan-daftar">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali</a>
            </div>
        </form>
    </div>
</div>

<script>
// Fungsi tampil/sembunyi sandi
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// === PROSES DAFTAR UTAMA ===
document.getElementById('formDaftar').addEventListener('submit', function(e) {
    e.preventDefault();

    // Ambil data
    const username = document.getElementById('username').value.trim();
    const nama = document.getElementById('nama').value.trim();
    const nohp = document.getElementById('nohp').value.trim();
    const email = document.getElementById('email').value.trim();
    const sandi1 = document.getElementById('sandi1').value;
    const sandi2 = document.getElementById('sandi2').value;

    // Cek sederhana
    if(sandi1 !== sandi2) return alert("⚠️ Sandi tidak cocok!");
    if(sandi1.length < 8) return alert("⚠️ Sandi minimal 8 karakter!");

    // Cek email sudah ada
    const semuaUser = JSON.parse(localStorage.getItem('teravia_users') || '[]');
    if(semuaUser.find(u => u.email === email)) return alert("❌ Email sudah terdaftar!");

    // Simpan akun BARU
    const akun = {
        id: Date.now(),
        username: username,
        nama: nama,
        email: email,
        nohp: nohp,
        sandi: sandi1,
        tier: 'Kaveling'
    };
    semuaUser.push(akun);
    localStorage.setItem('teravia_users', JSON.stringify(semuaUser));

    // ✅ SIMPAN SESI LOGIN DENGAN BENAR
    localStorage.setItem('teravia_sesi', JSON.stringify({
        id: akun.id,
        username: akun.username,
        nama: akun.nama
    }));

    alert("✅ Berhasil! Selamat datang, " + username);
    window.location.href = "/index.html";
});
</script>

<
    /body>
</html>
