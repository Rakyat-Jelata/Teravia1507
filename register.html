<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <!-- HAPUS BARIS EMAILJS YANG TIDAK DIPAKAI -->
</head>
<body class="halaman-login halaman-daftar">

<div class="wadah-login">
    <div class="kotak-login kotak-daftar">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Daftar Akun</h2>

        <!-- ✅ FORM DENGAN ID YANG BENAR -->
        <form id="formRegistrasi" class="form-login form-daftar">
            <div class="grup-input">
                <input type="text" id="username" placeholder="Username (Ditampilkan di listingan)" required>
            </div>
            <div class="grup-input">
                <input type="text" id="nama" placeholder="Nama Lengkap Penjual" required>
            </div>
            <div class="grup-input">
                <input type="tel" id="nohp" placeholder="Nomor WhatsApp" required>
            </div>
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>

            <div class="grup-input sandi-grup">
                <input type="password" id="kataSandi" placeholder="Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('kataSandi', this)">👁️</button>
            </div>

            <div class="grup-input sandi-grup">
                <input type="password" id="konfirmasiSandi" placeholder="Ketik Ulang Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="toggleSandi('konfirmasiSandi', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Daftar Akun</button>

            <div class="tautan-daftar">
                Sudah punya akun? <a href="login.html">Masuk Sekarang</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<script>
// Fungsi sembunyikan/tampilkan sandi
function toggleSandi(idInput, tombol) {
    const input = document.getElementById(idInput);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// === PROSES PENDAFTARAN YANG BENAR ===
document.getElementById('formRegistrasi').addEventListener('submit', function(e) {
    e.preventDefault();

    // Ambil semua nilai
    const username = document.getElementById('username').value.trim();
    const nama = document.getElementById('nama').value.trim();
    const nohp = document.getElementById('nohp').value.trim();
    const email = document.getElementById('email').value.trim();
    const sandi = document.getElementById('kataSandi').value;
    const ulangSandi = document.getElementById('konfirmasiSandi').value;

    // Validasi dasar
    if (sandi !== ulangSandi) {
        return alert("⚠️ Kata sandi dan konfirmasi tidak sama!");
    }
    if (sandi.length < 8) {
        return alert("⚠️ Kata sandi minimal 8 karakter!");
    }

    // Cek email sudah terdaftar
    const semuaUser = JSON.parse(localStorage.getItem('teravia_users') || '[]');
    const sudahAda = semuaUser.find(u => u.email === email);
    if (sudahAda) {
        return alert('❌ Email ini sudah terdaftar!');
    }

    // Simpan akun baru
    const akunBaru = {
        id: Date.now(),
        username: username,
        nama: nama,
        email: email,
        nohp: nohp,
        sandi: sandi,
        tier: 'Kaveling',
        tanggal_berlaku: new Date(Date.now() + 30*24*60*60*1000).toISOString(),
        kuota_terpakai: 0
    };

    semuaUser.push(akunBaru);
    localStorage.setItem('teravia_users', JSON.stringify(semuaUser));
    
    // Langsung login & langsung ke beranda
    localStorage.setItem('teravia_sesi', JSON.stringify({id: akunBaru.id, nama: akunBaru.nama}));
    alert('✅ Pendaftaran berhasil! Selamat datang di Teravia, ' + nama);
    window.location.href = '/index.html';
});
</script>

</
    body>
</html>
