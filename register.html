<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">

    

<!-- Pustaka Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Inisialisasi koneksi (Ganti dengan milikmu)
const SUPABASE_URL = "https://jvzrhjlwaysbsqyawnci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2enJoamx3YXlzYnNxeWF3bmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODkyMzYsImV4cCI6MjA5OTc2NTIzNn0.rnc5A6xABjEMI0pG-g0hCCRdFK0Om2UspFjTjOkCzeU";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

</head>
<body class="halaman-login halaman-daftar">

<div class="wadah-login">
    <div class="kotak-login kotak-daftar">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Daftar Akun</h2>

        <form id="formDaftar" class="form-login form-daftar">
            <div class="grup-input">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="grup-input">
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>
            <div class="grup-input">
                <input type="tel" id="nohp" placeholder="Nomor WhatsApp" required>
            </div>
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>

            <div class="grup-input sandi-grup">
                <input type="password" id="sandi1" placeholder="Kata Sandi (min 8 karakter)" required>
                <button type="button" onclick="ubahSandi('sandi1', this)">👁️</button>
            </div>
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi2" placeholder="Ulangi Kata Sandi" required>
                <button type="button" onclick="ubahSandi('sandi2', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Daftar Sekarang</button>

            <div class="tautan-daftar">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<script>
// FUNGSI TAMPIL/SEMBUNYI SANDI
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// PROSES DAFTAR KE SUPABASE
document.getElementById('formDaftar').addEventListener('submit', async function(e) {
    e.preventDefault();

    // AMBIL DATA DARI FORM
    const username = document.getElementById('username').value.trim();
    const nama_lengkap = document.getElementById('nama').value.trim();
    const nohp = document.getElementById('nohp').value.trim();
    const email = document.getElementById('email').value.trim();
    const sandi1 = document.getElementById('sandi1').value;
    const sandi2 = document.getElementById('sandi2').value;

    // VALIDASI DASAR
    if(sandi1 !== sandi2) return alert("⚠️ Sandi tidak cocok!");
    if(sandi1.length < 8) return alert("⚠️ Sandi minimal 8 karakter!");

    try {
        // SIMPAN KE TABEL USERS SUPABASE
        const { data, error } = await supabase
            .from('users')
            .insert([
                { 
                    username: username,
                    nama_lengkap: nama_lengkap,
                    nohp: nohp,
                    email: email,
                    sandi: sandi1
                }
            ])
            .select()
            .single();

        if(error) {
            if(error.code === '23505') {
                return alert("❌ Email ini sudah terdaftar!");
            }
            throw error;
        }

        // SIMPAN SESI LOGIN DI BROWSER
        localStorage.setItem('sesiTeravia', JSON.stringify({
            id: data.id,
            username: data.username,
            nama: data.nama_lengkap,
            is_admin: data.is_admin
        }));

        alert("✅ Pendaftaran berhasil! Selamat datang, " + username);
        window.location.href = "/index.html";

    } catch (err) {
        console.error("Error daftar:", err);
        alert("❌ Gagal mendaftar: " + err.message);
    }
});
</script>

</body>
</html>
