<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-login halaman-daftar">

<div class="wadah-login">
    <div class="kotak-login kotak-daftar">
        <img src="assets/img/logo.png" alt="Teravia" class="logo-login">
        <h2>Daftar Akun</h2>

        <form id="formDaftar" class="form-login form-daftar">
            <div class="grup-input">
                <input type="text" id="username" placeholder="Nama Pengguna" required>
            </div>
            <div class="grup-input">
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>
            <div class="grup-input">
                <input type="tel" id="nohp" placeholder="Nomor WhatsApp Aktif" required>
            </div>
            <div class="grup-input">
                <input type="email" id="email" placeholder="Alamat Email" required>
            </div>

            <!-- Kata Sandi Pertama -->
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi1" placeholder="Kata Sandi (min 8 karakter)" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi1', this)">👁️</button>
            </div>

            <!-- Ulangi Kata Sandi -->
            <div class="grup-input sandi-grup">
                <input type="password" id="sandi2" placeholder="Ulangi Kata Sandi" required>
                <button type="button" class="tombol-mata" onclick="ubahSandi('sandi2', this)">👁️</button>
            </div>

            <button type="submit" class="btn-masuk">Daftar Sekarang</button>

            <div class="tautan-daftar">
                Sudah punya akun? <a href="login.html">Masuk Sekarang</a>
            </div>
            <div class="tautan-kembali">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </form>
    </div>
</div>

<!-- KONEKSI SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Inisialisasi Koneksi Supabase
const SUPABASE_URL = "https://jvzrhjlwaysbsqyawnci.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2enJoamx3YXlzYnNxeWF3bmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODkyMzYsImV4cCI6MjA5OTc2NTIzNn0.rnc5A6xABjEMI0pG-g0hCCRdFK0Om2UspFjTjOkCzeU";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Fungsi Lihat/Sembunyikan Kata Sandi
function ubahSandi(id, tombol) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    tombol.textContent = input.type === "password" ? "👁️" : "🙈";
}

// Proses Pendaftaran
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formDaftar');
    if (!form) return;

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Ambil semua nilai input
        const dataPengguna = {
            username: document.getElementById('username').value.trim(),
            nama_lengkap: document.getElementById('nama').value.trim(),
            nohp: document.getElementById('nohp').value.trim(),
            email: document.getElementById('email').value.trim(),
            sandi: document.getElementById('sandi1').value,
            paket_aktif: 'Kaveling', // Paket awal semua pengguna baru
            is_admin: false
        };
        const sandiUlang = document.getElementById('sandi2').value;

        // Validasi
        if (dataPengguna.sandi !== sandiUlang) {
            return alert("⚠️ Kata sandi tidak cocok! Pastikan kedua kolom sama.");
        }
        if (dataPengguna.sandi.length < 8) {
            return alert("⚠️ Kata sandi minimal harus 8 karakter!");
        }

        try {
            // Simpan ke database Supabase
            const { data, error } = await supabase
                .from('users')
                .insert([dataPengguna])
                .select()
                .single();

            if (error) {
                if (error.code === '23505') {
                    return alert("❌ Alamat email ini sudah terdaftar! Silakan gunakan email lain atau masuk.");
                }
                throw new Error(error.message);
            }

            // Simpan sesi login otomatis
            localStorage.setItem('sesiTeravia', JSON.stringify({
                id: data.id,
                username: data.username,
                nama: data.nama_lengkap,
                paket: data.paket_aktif,
                is_admin: data.is_admin
            }));

            alert(`✅ Pendaftaran Berhasil!\nSelamat datang, ${data.nama_lengkap}!`);
            window.location.href = "index.html";

        } catch (err) {
            console.error("Kesalahan daftar:", err);
            alert("❌ Gagal mendaftar: " + (err.message || "Terjadi kesalahan tidak diketahui"));
        }
    });
});
</script>

</body>
</html>
