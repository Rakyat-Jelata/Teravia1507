<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="wadah-login">
    <div class="kotak-login">
        <h2>Daftar Akun Baru</h2>

        <!-- ✅ FORM DENGAN ID YANG PASTI BENAR -->
        <form id="formDaftarBaru">
            <div class="grup-input">
                <input type="text" id="inputUser" placeholder="Username" required>
            </div>
            <div class="grup-input">
                <input type="email" id="inputEmail" placeholder="Email" required>
            </div>
            <div class="grup-input">
                <input type="password" id="inputSandi" placeholder="Kata Sandi (min 8 huruf)" required>
            </div>

            <button type="submit" class="btn-masuk">Daftar & Masuk</button>
            <p style="text-align:center;margin-top:10px;">
                <a href="login.html">Sudah punya akun?</a> | 
                <a href="index.html">Kembali</a>
            </p>
        </form>
    </div>
</div>

<script>
// TUNGGU SAMPAI HALAMAN SELESAI DIMUAT BARU JALANKAN
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formDaftarBaru');
    
    if(!form) {
        alert("Form tidak ditemukan!");
        return;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Ambil data
        const user = document.getElementById('inputUser').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const sandi = document.getElementById('inputSandi').value;

        // Cek sederhana
        if(sandi.length < 8) return alert("Sandi minimal 8 karakter!");

        // Cek email sudah ada
        const dataUser = JSON.parse(localStorage.getItem('dataAkunTeravia') || '[]');
        if(dataUser.find(a => a.email === email)) return alert("Email sudah terdaftar!");

        // Simpan akun baru
        const akunBaru = {
            id: Date.now(),
            username: user,
            email: email,
            sandi: sandi,
            paket: 'Kaveling'
        };
        dataUser.push(akunBaru);
        localStorage.setItem('dataAkunTeravia', JSON.stringify(dataUser));

        // ✅ SIMPAN SESI LOGIN DENGAN NAMA BARU AGAR TIDAK BENTROK
        localStorage.setItem('sesiTeravia', JSON.stringify({
            id: akunBaru.id,
            nama: akunBaru.username
        }));

        alert("✅ Berhasil! Selamat datang " + user);
        // Pindah ke beranda
        window.location.href = "index.html";
    });
});
</script>

</body>
</html>
