<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password - TERAVIA</title>

    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">

</head>

<body>

<main class="wadah-utama">

<div class="wadah-daftar">


<div class="logo-tengah">
    <img src="assets/img/logo.png" alt="Teravia">
</div>


<h1 class="judul-daftar">
    Password Baru
</h1>


<p class="subjudul">
    Masukkan password baru Anda
</p>



<form id="formResetPassword">


<div class="grup-input">

<label for="password">
Password Baru
</label>

<input
type="password"
id="password"
placeholder="Minimal 6 karakter"
minlength="6"
required>

</div>



<div class="grup-input">

<label for="konfirmasiPassword">
Konfirmasi Password
</label>

<input
type="password"
id="konfirmasiPassword"
placeholder="Ulangi password"
required>

</div>



<button 
type="submit"
class="tombol-daftar">

Simpan Password

</button>


</form>


</div>

</main>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/js/supabase.js"></script>

<script src="assets/js/services/auth-service.js"></script>

<script src="assets/js/reset-password.js"></script>


</body>
</html>
