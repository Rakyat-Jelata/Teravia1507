<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Admin - Teravia</title>
    <link rel="icon" href="/assets/img/logo.png">
    <link rel="stylesheet" href="/assets/css/general.css">
    <style>
        body { 
            background: linear-gradient(135deg, #165DFF 0%, #0F4CD0 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin:0;
            font-family: system-ui, sans-serif;
        }
        .kotak-login { 
            background: white; 
            border-radius: 16px; 
            padding: 32px 24px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
        }
        .logo { 
            text-align: center; 
            margin-bottom: 24px; 
        }
        .logo img { 
            height: 48px; 
        }
        .logo h2 { 
            color: #165DFF; 
            margin-top: 8px; 
            font-size: 20px; 
            margin: 10px 0 0;
        }
        .form-group { 
            margin-bottom: 16px; 
        }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px; 
            font-size: 14px; 
            color:#333;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            box-sizing: border-box;
        }
        input:focus { 
            outline: none; 
            border-color: #165DFF; 
            box-shadow: 0 0 0 3px rgba(22,93,255,0.1); 
        }
        .btn { 
            width: 100%; 
            padding: 13px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn-primary { 
            background: #165DFF; 
            color: white; 
        }
        .btn-primary:hover { 
            background: #0F4CD0; 
        }
        .pesan-error { 
            color: #ef4444; 
            font-size: 13px; 
            margin-top: 8px; 
            display: none; 
            text-align: center; 
            padding:8px;
            background:#fef2f2;
            border-radius:6px;
        }
        .kembali { 
            text-align: center; 
            margin-top: 16px; 
        }
        .kembali a { 
            color: #666; 
            font-size: 13px; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

<div class="kotak-login">
    <div class="logo">
        <img src="/assets/img/logo.png" alt="Teravia">
        <h2>Panel Admin Teravia</h2>
    </div>

    <form id="formLogin">
        <div class="form-group">
            <label>Email Admin</label>
            <input type="email" id="emailAdmin" placeholder="teravia.admin@gmail.com" required>
        </div>
        <div class="form-group">
            <label>Kata Sandi</label>
            <input type="password" id="sandiAdmin" placeholder="Masukkan kata sandi" required>
        </div>
        <button type="submit" class="btn btn-primary">Masuk ke Panel</button>
        <div class="pesan-error" id="pesanError">Email atau kata sandi salah!</div>
    </form>

    <div class="kembali">
        <a href="/index.html">← Kembali ke Beranda Situs</a>
    </div>
</div>

<script>
// === AKUN ADMIN ===
const DAFTAR_ADMIN = [
  { 
    email: "teravia.admin@gmail.com", 
    sandi: "TeraviaAdmin@2026", 
    nama: "Admin Utama Teravia", 
    level: "Owner" 
  }
];

document.getElementById('formLogin').addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('emailAdmin').value.trim();
    const sandi = document.getElementById('sandiAdmin').value.trim();
    const pesan = document.getElementById('pesanError');

    const akun = DAFTAR_ADMIN.find(a => a.email === email && a.sandi === sandi);
    if(akun){
        // PAKAI localStorage AGAR LEBIH STABIL, BUKAN sessionStorage
        localStorage.setItem('adminTeravia', JSON.stringify({
            nama: akun.nama,
            level: akun.level,
            email: akun.email
        }));
        // Beri waktu simpan sebelum pindah halaman
        setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
        }, 200);
    } else {
        pesan.style.display = 'block';
    }
});

// Cek jika sudah login
if(localStorage.getItem('adminTeravia')){
    window.location.href = 'admin-dashboard.html';
}
</script>

</body>
</html>
