<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - TERAVIA</title>

    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/general.css">
</head>

<body>

<main class="wadah-utama">

    <div class="wadah-daftar">

        <div class="logo-tengah">
            <img src="assets/img/logo.png" alt="Teravia">
        </div>

        <h1 class="judul-daftar">
            Lupa Password
        </h1>

        <p class="subjudul">
            Masukkan email Anda untuk menerima link reset password
        </p>


        <form id="formLupaPassword">

            <div class="grup-input">

                <label for="email">
                    Email
                </label>

                <input 
                    type="email"
                    id="email"
                    placeholder="email@contoh.com"
                    required>

            </div>


            <button 
                type="submit"
                class="tombol-daftar">
                Kirim Link Reset
            </button>

        </form>


        <div class="tautan-masuk">
            Ingat password?
            <a href="login.html">
                Kembali Login
            </a>
        </div>


    </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/services/auth-service.js"></script>
<script src="assets/js/lupa-password.js"></script>

</body>
</html>
