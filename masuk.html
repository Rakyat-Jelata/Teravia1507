<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-auth">
    <div class="bagian-kiri">
        <div class="kotak-form">
            <img src="assets/img/logo.png" alt="Teravia" class="logo-auth">
            <h2>Masuk ke Akun Anda</h2>
            
            <form>
                <div class="form-grup">
                    <input type="email" placeholder="Alamat Email" required>
                </div>
                <div class="form-grup">
                    <input type="password" placeholder="Kata Sandi" required>
                </div>
                <div class="baris-bantuan">
                    <label><input type="checkbox"> Ingat Saya</label>
                    <a href="#">Lupa Kata Sandi?</a>
                </div>
                <button type="submit" class="btn-utama btn-penuh">Masuk</button>
            </form>

            <p class="tautan-bawah">Belum punya akun? <a href="daftar.html">Daftar Sekarang</a></p>
        </div>
    </div>

    <div class="bagian-kanan" style="background-image: url('assets/img/hero-bg.png');">
        <div class="tulisan-latar">
            <h1>TERAVIA</h1>
            <p>Temukan properti impianmu dengan mudah dan aman</p>
        </div>
    </div>
</body>
</html>
