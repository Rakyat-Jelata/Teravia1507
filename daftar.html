<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Teravia</title>
    <link rel="icon" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="halaman-auth">
    <div class="bagian-kiri">
        <div class="kotak-form">
            <img src="assets/img/logo.png" alt="Teravia" class="logo-auth">
            <h2>Buat Akun Baru</h2>
            <p class="keterangan-form">Isi data berikut untuk bergabung</p>
            
            <form>
                <div class="form-grup">
                    <input type="text" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-grup">
                    <input type="email" placeholder="Alamat Email" required>
                </div>
                <div class="form-grup">
                    <input type="password" placeholder="Kata Sandi" required>
                </div>
                <div class="form-grup">
                    <input type="password" placeholder="Konfirmasi Kata Sandi" required>
                </div>
                <button type="submit" class="btn-utama btn-penuh">Daftar Sekarang</button>
            </form>

            <p class="tautan-bawah">Sudah punya akun? <a href="masuk.html">Masuk Sekarang</a></p>
        </div>
    </div>

    <div class="bagian-kanan" style="background-image: url('assets/img/hero-bg.png');">
        <div class="tulisan-latar">
            <h1>TERAVIA</h1>
            <p>Mitra terpercaya mencari properti impian Anda</p>
        </div>
    </div>
</body>
</html>
